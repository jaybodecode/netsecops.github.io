<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="32" fill="#a855f7"/>
  <!-- wrench rotated ~-40° around center -->
  <g transform="rotate(-40 32 32)">
    <!-- handle -->
    <rect x="28" y="27" width="8" height="26" rx="4" fill="white"/>
    <!-- head: ring -->
    <circle cx="32" cy="20" r="11" fill="white"/>
    <!-- inner cutout -->
    <circle cx="32" cy="20" r="6" fill="#a855f7"/>
    <!-- jaw opening: slot through top -->
    <rect x="27" y="10" width="10" height="12" fill="#a855f7"/>
  </g>
</svg>
