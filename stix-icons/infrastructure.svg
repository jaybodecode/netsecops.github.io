  <line x1="16" y1="22" x2="7" y2="40" stroke="white" stroke-width="1.5"/>
  <line x1="16" y1="22" x2="32" y2="40" stroke="white" stroke-width="1.5"/>
  <!-- suspension cables from right tower -->
  <line x1="48" y1="22" x2="57" y2="40" stroke="white" stroke-width="1.5"/>
  <line x1="48" y1="22" x2="32" y2="40" stroke="white" stroke-width="1.5"/>
</svg>
