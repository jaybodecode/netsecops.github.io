<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="32" fill="#64748b"/>
  <!-- bridge structure -->
  <!-- roadway -->
  <rect x="7" y="40" width="50" height="5" rx="2" fill="white"/>
  <!-- left tower -->
  <rect x="14" y="21" width="5" height="19" rx="1" fill="white"/>
  <!-- right tower -->
