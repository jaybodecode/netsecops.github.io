title: Suspicious Reconnaissance Tool Execution
id: d67572cc-04e3-41d9-a5f9-59033632f0cc
status: experimental
description: Detects the execution of legitimate Windows tools often used by ransomware groups for reconnaissance and lateral movement.
references:
  - https://www.securityweek.com/ransomware-attack-shuts-down-mills-of-australias-second-largest-sugar-producer/
author: cyber.netsecops.io
date: 2026-06-16
tags:
  - attack.t1049
  - attack.t1021
  - attack.discovery
level: medium
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\wmic.exe'
      - '\nltest.exe'
      - '\powershell.exe'
  condition: selection