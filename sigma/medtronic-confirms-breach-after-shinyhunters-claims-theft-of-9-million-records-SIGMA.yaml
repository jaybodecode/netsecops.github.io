title: Anomalous Large Data Transfer to Cloud Storage
id: 9c7b8d4e-1a2b-4c5d-8e9f-0a1b2c3d4e5f
status: experimental
description: Detects potentially anomalous large data transfers to external destinations, which could indicate data exfiltration by groups like ShinyHunters. This rule is conceptual and requires tuning based on baseline network traffic.
references:
  - https://www.securityweek.com/medtronic-hack-confirmed-after-shinyhunters-threatens-data-leak/
author: cyber.netsecops.io
date: 2026-04-30
tags:
  - attack.t1567.002
  - attack.exfiltration
falsepositives:
  - Legitimate large data backups or transfers to cloud services.
level: medium
logsource:
  category: firewall
detection:
  selection:
    action: 'allow'
    bytes_out|gt: 100000000
  condition: selection