title: Potential SharePoint Exploitation Attempt via Layouts Path (CVE-2026-32201)
id: 7f5b1a3c-9d8e-4f7a-8b6c-1d2e3f4a5b6c
status: experimental
description: 'Detects web requests to SharePoint''s /_layouts/ path, which could indicate attempts to exploit the spoofing vulnerability CVE-2026-32201.'
references:
  - https://www.crowdstrike.com/blog/april-2026-patch-tuesday/
author: cyber.netsecops.io
date: 2026-04-18
tags:
  - attack.t1190
falsepositives:
  - Legitimate administrative access to SharePoint layouts pages.
level: medium
logsource:
  category: proxy
detection:
  selection:
    c-uri|contains: '/_layouts/'
  condition: selection
