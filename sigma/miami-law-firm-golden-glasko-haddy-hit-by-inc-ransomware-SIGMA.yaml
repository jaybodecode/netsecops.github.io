title: INC Ransom Precursor - nltest Domain Controller Discovery
id: 8c1d2e3f-4a5b-4c6d-8e9f-0a1b2c3d4e5f
status: experimental
description: Detects the use of 'nltest /dclist:', a command used by attackers for early-stage reconnaissance to list all domain controllers.
references:
  - https://www.galaxywarden.com/blog/breach/golden-glasko-associates-incransom-2026-07
author: cyber.netsecops.io
date: 2026-07-16
tags:
  - attack.t1018
  - attack.discovery
level: medium
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\nltest.exe'
    CommandLine|contains: '/dclist:'
  condition: selection
