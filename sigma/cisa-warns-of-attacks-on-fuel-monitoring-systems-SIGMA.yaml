author: cyber.netsecops.io
date: 2026-06-04
tags:
  - attack.t0886
  - attack.initial_access
level: medium
logsource:
  category: firewall
detection:
  selection:
    dst_port:
      - 8001
      - 9001
      - 10001
  condition: selection