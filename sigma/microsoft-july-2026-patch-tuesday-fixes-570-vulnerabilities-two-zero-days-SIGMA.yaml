title: Suspicious Child Process from SharePoint Worker Process
id: 9b2d5c8a-1b3e-4f6d-8c7a-9f8e7d6c5b4a
status: experimental
description: Detects suspicious child processes such as cmd.exe or powershell.exe spawning from the SharePoint worker process (w3wp.exe), which could indicate exploitation of vulnerabilities like CVE-2026-56164.
references:
  - https://www.forbes.com/sites/daveywinder/2026/07/15/microsoft-warns-2-zero-days-already-exploited-in-attacks-update-now/
author: cyber.netsecops.io
date: 2026-07-15
tags:
  - attack.t1190
  - attack.t1068
level: high
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    ParentImage|endswith: '\w3wp.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
  condition: selection
---
