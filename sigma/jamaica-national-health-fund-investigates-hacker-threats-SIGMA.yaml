title: Anomalous Service Account Interactive Logon
id: 0c281ec0-2e02-40ff-bf9c-22a05cda0a1f
status: experimental
description: >
  Monitors for service accounts being used for interactive logons, which is highly anomalous and could indicate credential misuse.
references:
  - https://jis.gov.jm/nhf-investigating-cybersecurity-threat/
author: cyber.netsecops.io
date: 2026-06-11
tags:
  - attack.t1078
level: high
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 2 # Interactive
    AccountName|endswith: '$'
  condition: selection
falsepositives:
  - Rare administrative tasks that require interactive logon with a service account.