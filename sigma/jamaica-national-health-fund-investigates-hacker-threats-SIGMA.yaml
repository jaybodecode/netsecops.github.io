title: Anomalous Database Query Activity
id: 4b9f0c1a-8d7e-4f6a-9b3c-1d2e3f4a5b6c
status: experimental
description: >
  Detects anomalous database query activity, such as large SELECT queries, queries from unusual hostnames or user accounts, or access during non-business hours. This is a conceptual rule and requires a logging solution capable of monitoring database queries.
references:
  - https://jis.gov.jm/nhf-investigating-cybersecurity-threat/
author: cyber.netsecops.io
date: 2026-06-11
tags:
  - attack.t1213
level: medium
logsource:
  category: application
  product: database
detection:
  selection_large_query:
    Message|contains|all:
      - 'SELECT'
      - 'FROM'
    # This part of the rule is conceptual and would require aggregation capabilities in the SIEM.
    # e.g., count(bytes) > 100MB in 1 hour
  selection_unusual_host:
    # Placeholder for known unusual hostnames
    Hostname|contains:
      - 'non-app-server'
  selection_off_hours:
    # Placeholder for non-business hours logic
    Time|contains:
      - 'T00:'
      - 'T01:'
      - 'T02:'
      - 'T03:'
      - 'T04:'
      - 'T22:'
      - 'T23:'
  condition: 1 of selection_*
falsepositives:
  - Legitimate large data exports or administrative tasks.
  - Remote work from different timezones.
