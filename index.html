<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Netsec IO - Cybersecurity Advisories</title>
    <style>
        :root {
            --bg-color: #0A0A0A;
            --text-color: #E0E0E0;
            --neon-blue: #00FFFF;
            --neon-purple: #BF00FF;
            --neon-pink: #FF00BF;
            --glow-spread: 5px;
            --glow-strength: 15px;
        }

        body {
            font-family: 'Consolas', 'Roboto Mono', monospace, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.8) 0%, rgba(20, 20, 20, 0.8) 100%);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), 0 0 40px rgba(191, 0, 255, 0.05);
            border-radius: 12px;
            position: relative;
            z-index: 1;
        }

        .neon-text {
            text-shadow:
                0 0 var(--glow-spread) var(--neon-blue),
                0 0 var(--glow-strength) var(--neon-purple),
                0 0 calc(var(--glow-strength) * 1.5) var(--neon-pink);
            transition: text-shadow 0.3s ease-in-out;
        }

        .neon-text:hover {
            text-shadow:
                0 0 calc(var(--glow-spread) * 1.5) var(--neon-blue),
                0 0 calc(var(--glow-strength) * 2) var(--neon-purple),
                0 0 calc(var(--glow-strength) * 3) var(--neon-pink);
        }

        header {
            margin-bottom: 40px;
        }

        .main-title {
            font-size: clamp(2.5em, 8vw, 5em);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            color: var(--neon-blue);
            line-height: 1;
        }

        .subtitle {
            font-size: clamp(0.9em, 2.5vw, 1.3em);
            color: var(--text-color);
            opacity: 0.8;
            letter-spacing: 0.05em;
        }

        main {
            margin-bottom: 40px;
        }

        .branding-image-link {
            display: inline-block;
            margin: 30px 0;
            padding: 5px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), 0 0 30px rgba(191, 0, 255, 0.2);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .branding-image-link:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5), 0 0 50px rgba(191, 0, 255, 0.4);
        }

        .branding-image {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
            filter: brightness(0.9) contrast(1.1);
        }

        .cta-section {
            margin-top: 30px;
        }

        .cta-text {
            font-size: clamp(1em, 2.8vw, 1.2em);
            max-width: 600px;
            margin: 0 auto 25px auto;
            line-height: 1.6;
            color: var(--text-color);
            opacity: 0.9;
        }

        .cta-button {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: var(--bg-color);
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6), 0 0 30px rgba(191, 0, 255, 0.4);
            transition: all 0.3s ease-in-out;
            outline: none;
        }

        .cta-button:hover {
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8), 0 0 50px rgba(191, 0, 255, 0.6), 0 0 80px rgba(255, 0, 191, 0.3);
            transform: translateY(-3px);
        }

        .cta-button:active {
            transform: translateY(0);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(191, 0, 255, 0.3);
        }

        footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
            font-size: 0.85em;
            color: var(--text-color);
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .main-title {
                font-size: clamp(2em, 7vw, 4em);
            }

            .subtitle {
                font-size: clamp(0.8em, 2.8vw, 1.1em);
            }

            .cta-button {
                padding: 12px 25px;
                font-size: 1em;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            header {
                margin-bottom: 20px;
            }

            main {
                margin-bottom: 20px;
            }

            .branding-image-link {
                margin: 20px 0;
            }

            .cta-button {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1 class="main-title neon-text">CYBER NETSEC IO</h1>
            <p class="subtitle">DAILY CYBERSECURITY THREAT BRIEFINGS</p>
        </header>

        <main>
            <a href="#" class="branding-image-link">
                <img src="banner.png" alt="Futuristic Cyber City - Cyber Netsec IO Branding" class="branding-image">
            </a>

            <div class="cta-section">
                <p class="cta-text">
                    Stay ahead of emerging threats with our expert-curated, real-time cybersecurity advisories. We decode the digital dark, so you don't have to.
                </p>
                <a class="cta-button" href="https://www.youtube.com/channel/UCkfsGIs1agqdNim-Q9qG5jw" target="_blank" rel="noopener">Join Our Briefings</a>
            </div>
        </main>

        <footer>
            <p>&copy; <span id="currentYear"></span> Cyber Netsec IO. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
